<a [routerLink]="['/productdetails', cardInput.id]" routerLinkActive="active" ariaCurrentWhenActive="page">
    <article>
        <div class="img-area">
            <img [src]="cardInput.imageUrl"/>
        </div>
        <footer>
            <strong class="desc">{{cardInput.desc}}</strong>
            <p class="price">${{cardInput.price}}</p>
        </footer>
    </article>
</a>
